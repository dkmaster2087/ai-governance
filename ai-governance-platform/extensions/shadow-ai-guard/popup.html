<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    .header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
    .header .logo { width: 28px; height: 28px; background: #4f46e5; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .header .logo svg { width: 16px; height: 16px; fill: white; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header .mode { margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
    .mode-block { background: rgba(239,68,68,0.2); color: #f87171; }
    .mode-monitor { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .section { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-bottom: 8px; }
    .stat-row { display: flex; gap: 8px; }
    .stat { flex: 1; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; text-align: center; }
    .stat .value { font-size: 20px; font-weight: 700; }
    .stat .label { font-size: 10px; color: #64748b; margin-top: 2px; }
    .config-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
    .config-row label { font-size: 12px; color: #94a3b8; }
    .config-row input, .config-row select { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 6px; padding: 4px 8px; font-size: 12px; }
    .config-row select { width: 100px; }
    .config-row input[type="text"] { width: 180px; }
    .event { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 11px; }
    .event .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .event .dot.blocked { background: #f87171; }
    .event .dot.detected { background: #fbbf24; }
    .event .domain { color: #f59e0b; font-family: monospace; font-size: 11px; }
    .event .time { margin-left: auto; color: #475569; font-size: 10px; }
    .empty { text-align: center; padding: 20px; color: #475569; font-size: 12px; }
    .btn { width: 100%; padding: 8px; border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; margin-top: 4px; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
    .btn:hover { opacity: 0.9; }
    .footer { padding: 12px 16px; text-align: center; }
    .footer a { color: #818cf8; text-decoration: none; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7l-9-5zm0 2.18l6.5 3.64v7.36L12 18.82l-6.5-3.64V7.82L12 4.18z"/></svg>
    </div>
    <h1>Aegis AI Guard</h1>
    <span id="modeBadge" class="mode mode-monitor">Monitor</span>
  </div>

  <div class="section">
    <div class="stat-row">
      <div class="stat">
        <div class="value" id="eventCount">0</div>
        <div class="label">Events</div>
      </div>
      <div class="stat">
        <div class="value" id="blockedCount" style="color:#f87171">0</div>
        <div class="label">Blocked</div>
      </div>
      <div class="stat">
        <div class="value" id="domainCount">0</div>
        <div class="label">Domains</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Configuration</div>
    <div class="config-row">
      <label>Tenant ID</label>
      <input type="text" id="tenantId" placeholder="tenant_xxx">
    </div>
    <div class="config-row">
      <label>Mode</label>
      <select id="modeSelect">
        <option value="monitor">Monitor</option>
        <option value="block">Block</option>
      </select>
    </div>
    <div class="config-row">
      <label>Gateway URL</label>
      <input type="text" id="gatewayUrl" placeholder="http://localhost:3000">
    </div>
    <button class="btn btn-primary" id="saveBtn">Save & Apply</button>
  </div>

  <div class="section">
    <div class="section-title">Recent Activity</div>
    <div id="eventList"></div>
  </div>

  <div class="footer">
    <button class="btn btn-secondary" id="clearBtn">Clear Events</button>
    <br><br>
    <a id="dashLink" href="#">Open Governance Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
